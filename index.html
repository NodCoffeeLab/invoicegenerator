<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래명세서 생성기 (파일 추출 버전)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* (이전 스타일 유지, 하단 버튼 스타일 추가) */
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f0f0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 1000px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #002B49; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        th { background-color: #002B49; color: white; border: 1px solid #ccc; padding: 10px; }
        td { border: 1px solid #ccc; padding: 10px; vertical-align: top; }
        .btn-group { text-align: center; margin-top: 20px; }
        .btn { padding: 10px 20px; margin: 5px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-pdf { background-color: #dc3545; }
        .btn-img { background-color: #28a745; }
        .btn-xls { background-color: #ffc107; color: black; }
    </style>
</head>
<body>
    <div class="container" id="printableArea">
        <h1>거래명세서</h1>
        <table id="itemTable">
            <tbody id="tableBody"></tbody>
        </table>
        <div class="total-section">
            <p>최종 견적금액: <span id="grandTotal">0</span> 원</p>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-pdf" onclick="savePDF()">PDF 저장 (이메일용)</button>
        <button class="btn btn-img" onclick="savePNG()">PNG 저장 (메신저용)</button>
        <button class="btn btn-xls" onclick="saveExcel()">엑셀 저장 (보관용)</button>
    </div>

    <script>
        // PDF 저장
        async function savePDF() {
            const element = document.getElementById('printableArea');
            const canvas = await html2canvas(element);
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save("거래명세서.pdf");
        }

        // PNG 저장
        async function savePNG() {
            const element = document.getElementById('printableArea');
            const canvas = await html2canvas(element);
            const link = document.createElement('a');
            link.download = '거래명세서.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 엑셀 저장
        function saveExcel() {
            const table = document.getElementById('itemTable');
            const wb = XLSX.utils.table_to_book(table, {sheet:"거래명세서"});
            XLSX.writeFile(wb, '거래명세서.xlsx');
        }
    </script>
</body>
</html>
